image: python:3.12-bookworm

stages:
    - release

# --- CREATE THE RELEASE ---
create_release:
    stage: release
    rules:
        # Only run this job when a tag is pushed to the repository
        - if: "$CI_COMMIT_TAG"

    before_script:
        # Install dependencies required for PyInstaller, Node.js, and Release CLI
        - |
            apt-get update -y
            apt-get install -y \
                build-essential \
                ca-certificates \
                curl \
                git \
                gnupg \
                jq \
                libbz2-dev \
                libffi-dev \
                liblzma-dev \
                libsqlite3-dev \
                libssl-dev \
                pkg-config \
                zlib1g-dev

        # Install Node.js 20.x
        - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        - apt-get install -y nodejs

        # Install GitLab Release CLI
        - curl --location --output /usr/local/bin/release-cli "https://gitlab.com/api/v4/projects/gitlab-org%2Frelease-cli/packages/generic/release-cli/latest/release-cli-linux-amd64"
        - chmod +x /usr/local/bin/release-cli

    script: |
        echo "=> Toolchain Versions"
        node --version
        npm --version
        python3 --version
        python3 -m pip --version

        echo "=> Install NPM Dependencies"
        npm ci

        echo "=> Build Python Binary"
        npm run build-binary

        echo "=> Package VS Code Extension"
        npm run package

        echo "=> Extract Version and Asset Information"
        export RELEASE_VERSION="${CI_COMMIT_TAG#v}"
        export RELEASE_TITLE="Version $RELEASE_VERSION"
        export RELEASE_DESCRIPTION=$(git log -1 --format=%B)
        export PACKAGE_VERSION=$(jq -r '.version' package.json)
        export PACKAGE_NAME=$(jq -r '.name' package.json)
        export ASSET_NAME="${PACKAGE_NAME}-${PACKAGE_VERSION}.vsix"
        export PACKAGE_REGISTRY_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_NAME}/${RELEASE_VERSION}/${ASSET_NAME}"

        # Silent Upload
        curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "${ASSET_NAME}" "${PACKAGE_REGISTRY_URL}"

        # Prepare Safe Filepath
        SAFE_FILEPATH="/$(echo "$ASSET_NAME" | sed 's/@/-/g')"

        # Prepare Assets Link JSON
        ASSETS_LINK_JSON=$(jq -n \
          --arg name "$ASSET_NAME" \
          --arg url "$PACKAGE_REGISTRY_URL" \
          --arg filepath "$SAFE_FILEPATH" \
          '{"name": $name, "url": $url, "filepath": $filepath}')

        echo "=> Create GitLab Release"
        release-cli create --name "$RELEASE_TITLE" --tag-name "$CI_COMMIT_TAG" \
          --description "$RELEASE_DESCRIPTION" \
          --assets-link "$ASSETS_LINK_JSON"
